<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>4</title>
    <link rel="icon" type="image/x-icon" href="/img/lock2.png">
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        @keyframes flicker {

            0%,
            18%,
            22%,
            25%,
            53%,
            57%,
            100% {
                opacity: 1;
                filter: drop-shadow(0 15px 20px rgba(253, 224, 71, 0.25));
            }

            20%,
            24%,
            55% {
                opacity: 0.2;
                filter: none;
            }
        }

        @keyframes coneFlicker {

            0%,
            18%,
            22%,
            25%,
            53%,
            57%,
            100% {
                opacity: 0.2;
            }

            20%,
            24%,
            55% {
                opacity: 0.04;
            }
        }

        .animate-flicker {
            animation: flicker 4s infinite alternate;
        }

        .animate-cone {
            animation: coneFlicker 4s infinite alternate;
        }

        .spotlight-bg {
            background: radial-gradient(circle at 50% 35%,
                    rgba(253, 224, 71, 0.12) 0%,
                    rgba(0, 0, 0, 0) 65%);
        }

        .lamp-bowl {
            clip-path: polygon(15% 0%, 85% 0%, 100% 100%, 0% 100%);
            border-radius: 50% 50% 0 0 / 15% 15% 0 0;
        }
    </style>
</head>

<body
    class="bg-zinc-950 text-gray-200 h-screen overflow-hidden flex flex-col items-center relative select-none">

    <div class="absolute inset-0 spotlight-bg pointer-events-none"></div>

    <div class="relative flex flex-col items-center z-10 w-full">

        <div class="w-1.5 h-12 bg-zinc-800 shadow-inner"></div>

        <div class="w-10 h-4 bg-zinc-700 rounded-t-sm shadow-md"></div>

        <div
            class="lamp-bowl w-48 h-20 bg-gradient-to-b from-zinc-800 to-zinc-900 border-b border-zinc-700 shadow-xl relative flex items-end justify-center">

            <div
                class="animate-flicker w-40 h-3 bg-amber-100 rounded-full blur-xs opacity-90 absolute -bottom-1 shadow-[0_0_30px_rgba(253,224,71,0.8)]">
            </div>

        </div>

        <div class="animate-cone absolute top-36 w-[600px] h-[600px] bg-gradient-to-b from-amber-300/20 to-transparent pointer-events-none origin-top blur-2xl"
            style="clip-path: polygon(35% 0%, 65% 0%, 100% 100%, 0% 100%);">
        </div>

    </div>

    <h1 class="text-3xl md:text-4xl font-semibold tracking-widest mt-32 text-amber-100 z-10">
        SECTION 4:
    </h1>

    <div class="mt-4 px-6 text-center z-10">
        <p class="max-w-xl text-zinc-300 text-lg leading-relaxed">
            Taking Risks & Challenging Yourself
        </p>
    </div>

    <a href="questions.html"
        class="fixed bottom-6 right-6 z-20 text-4xl text-amber-200 hover:text-amber-100 transition">
        →
    </a>

</body>

</html>
