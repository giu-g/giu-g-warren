<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trial</title>
    <style>
        :root {
            --wood-dark: #4a2c11;
            --wood-light: #704214;
            --gold: #d4af37;
            --bg-color: #1e2530;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);

            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;

            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        h1 {
            color: #ffffff;
            font-size: 2.5rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 20px;
            text-shadow: 0px 4px 10px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        .court-room {
            position: relative;
            width: 500px;
            height: 400px;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: center;
        }

        .sound-block {
            position: relative;
            width: 180px;
            height: 32px;
            background: linear-gradient(to bottom, var(--wood-light), var(--wood-dark));
            border-radius: 4px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.6);
            border-top: 3px solid var(--gold);
            z-index: 1;
            margin-bottom: 40px;
        }

        .gavel-container {
            position: absolute;
            bottom: 78px; 
            left: calc(50% - 400px); 
            width: 240px;
            height: 80px; 
            transform-origin: 215px 40px; 
            z-index: 2;
            animation: continuousStrike 1.2s cubic-bezier(0.25, 1, 0.5, 1) infinite;
        }

        .gavel-head {
            position: absolute;
            left: 10px;
            top: 0;
            width: 50px;
            height: 80px;
            background: linear-gradient(to bottom, var(--wood-dark), var(--wood-light), var(--wood-dark));
            border-radius: 5px;
            border-top: 6px solid var(--gold);
            border-bottom: 6px solid var(--gold);
            box-shadow: -5px 5px 10px rgba(0,0,0,0.4);
        }

        .gavel-handle {
            position: absolute;
            left: 60px;
            top: 33px; 
            width: 160px;
            height: 14px;
            background: linear-gradient(to bottom, var(--wood-light), var(--wood-dark));
            border-radius: 0 7px 7px 0;
            border-right: 8px solid var(--gold);
        }

        .shockwave {
            position: absolute;
            bottom: 65px;
            left: 50%; 
            transform: translateX(-50%) scale(0);
            width: 140px;
            height: 25px;
            border: 2px solid var(--gold);
            border-radius: 50%;
            opacity: 0;
            pointer-events: none;
            z-index: 3;
            animation: continuousRipple 1.2s ease-out infinite;
        }

        @keyframes continuousStrike {
            0% { transform: rotate(135deg); }
            10% { transform: rotate(120deg); }
            30% { transform: rotate(180deg); }
            38% { transform: rotate(173deg); }
            45% { transform: rotate(180deg); }
            70% { transform: rotate(180deg); }
            100% { transform: rotate(135deg); }
        }

        @keyframes continuousRipple {
            0%, 29% {
                transform: translateX(-50%) scale(0.1);
                opacity: 0;
            }
            30% {
                transform: translateX(-50%) scale(0.1);
                opacity: 1;
            }
            50% {
                transform: translateX(-50%) scale(1.5);
                opacity: 0;
            }
            100% {
                transform: translateX(-50%) scale(1.5);
                opacity: 0;
            }
        }
    </style>
</head>
<body>

    <h1>What's the verdict?</h1>

    <div class="court-room">
        <div class="shockwave"></div>

        <div class="gavel-container">
            <div class="gavel-head"></div>
            <div class="gavel-handle"></div>
        </div>

        <div class="sound-block"></div>
    </div>

</body>
</html>
